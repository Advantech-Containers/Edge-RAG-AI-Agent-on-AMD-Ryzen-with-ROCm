# Description:
#
#   This Docker Compose file deploys the Deepseek-R1-1.5B-Langchain-AI-Agent-RAG
#   environment optimized for AMD GPU acceleration using ROCm.
#
#   It provides a complete Retrieval-Augmented Generation (RAG) API service
#   powered by LangChain, integrated with Ollama for model loading and
#   management on Advantech edge AI devices and AMD ROCm-enabled platforms.
#
#   The stack includes:
#     - LangChain RAG backend service
#     - Ollama model runtime with ROCm GPU acceleration
#     - OpenWebUI web interface for interactive prompt testing
#
#   This configuration supports AMD RDNA/CDNA GPUs via:
#     - /dev/kfd
#     - /dev/dri
#     - ROCm device passthrough
#
