services:
  langchain-rag-amd:
    image: harbor.edgesync.cloud/amd/deepseek-langchain-rag-on-amd-rocm:1.3
    container_name: Deepseek-R1-1.5B-Langchain-AI-Agent-RAG-on-AMD
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    network_mode: host
    env_file: .env
    tty: true
    stdin_open: true
    privileged: true
    working_dir: /workspace
    volumes:
      - ./langchain-rag-service:/workspace/langchain-service/
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    restart: always

  openweb-ui-service:
    image: ghcr.io/open-webui/open-webui:0.6.5
    container_name: openweb-ui-service
    network_mode: host
    env_file: .env
    environment:
      OPENAI_API_BASE_URL: ${OPENAI_API_LANGCHAIN_BASE}
      PORT: ${OPENWEBUI_PORT}
      ENABLE_TAGS_GENERATION: ${ENABLE_TAGS_GENERATION}
      ENABLE_TITLE_GENERATION: ${ENABLE_TITLE_GENERATION}
    volumes:
      - open-webui:/app/backend/data
    restart: always

volumes:
  open-webui:
    driver: local
  ollama-models:
    driver: local
